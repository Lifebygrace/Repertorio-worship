  <style>
  :root{
    --primary:#002244;--accent:#ff8c42;--bg:#f0f4f8;--text:#002244;
    --section-bg:#fff8e1;--card-bg:#ffffff;--edit-bg:#FFEB3B;
  }
  body.dark{--bg:#121212;--text:#f0f4f8;--card-bg:#1e1e1e;--section-bg:#2a2a2a;--edit-bg:#f9a825}
  html,body{height:100%;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .25s,color .25s}
  header{background:var(--primary);color:#fff;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:12px}
  .logo img{height:56px;border-radius:8px}
  .controls{display:flex;gap:8px;align-items:center}
button{
  background:var(--accent);
  color:#fff;
  border:0;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;

  transition:
    transform 0.15s ease-out,
    box-shadow 0.15s ease-out;

  -webkit-tap-highlight-color: transparent;
}

button:active{
  transform: scale(0.94);
}
  button:hover{transform:scale(1.03)}
  main{max-width:900px;margin:18px auto;padding:12px}
.card{
  background:var(--card-bg);
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;

  box-shadow:
    0 1px 2px rgba(0,0,0,.04),
    0 4px 12px rgba(0,0,0,.06);

  transition:
    transform 0.25s cubic-bezier(.2,.8,.2,1),
    box-shadow 0.25s cubic-bezier(.2,.8,.2,1);

  will-change: transform, box-shadow;
  -webkit-tap-highlight-color: transparent;
}

/* Feedback táctil móvil */
.card:active{
  transform: scale(0.97);
  box-shadow:
    0 1px 1px rgba(0,0,0,.04),
    0 2px 6px rgba(0,0,0,.08);
}

/* Hover solo escritorio */
@media (hover: hover){
  .card:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,.10);
  }
}
  .section{background:var(--section-bg);padding:14px;border-radius:10px;margin-bottom:16px}
  input[type="text"],textarea,input[type="date"]{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc;background:transparent;color:inherit}
  .search-container{position:relative;margin-bottom:16px}
  #search{padding:14px 44px 14px 14px;border-radius:10px;border:2px solid var(--accent);font-size:1.05rem}
  #clearSearch{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:0;color:var(--accent);font-size:1.2rem;display:none}
  .link-btn{display:inline-block;background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none}
  .edit-banner{position:sticky;top:0;background:var(--edit-bg);padding:8px;text-align:center;font-weight:bold;display:none;z-index:50}
  footer{text-align:center;margin-top:24px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;margin-top:8px}
  th,td{border:1px solid #ccc;padding:6px;text-align:center}
  th{background:var(--accent);color:#fff;cursor:pointer}
  ul.fechas-lista{list-style:none;padding:0;margin:0;text-align:left}
  .fechas-box{min-width:180px}
  .small{font-size:0.8rem;padding:4px 6px;border-radius:6px;margin-left:2px}
  .meta-line{font-size:0.9rem;color:#555;display:flex;gap:10px;align-items:center;margin-top:6px}
  .meta-line .plays,.meta-line .last{display:inline-block}
  .tocada-btn{background:#0077cc;padding:6px 8px;border-radius:6px;color:#fff;border:0;cursor:pointer;font-weight:700}
  .tocada-btn:hover{opacity:0.95}
  .counter-badge{background:rgba(0,0,0,0.06);padding:6px 12px;border-radius:10px;font-weight:700}
  .preview-img{max-width:350px;border-radius:8px;margin:8px 8px 0 0;display:inline-block;box-shadow:0 0 6px rgba(0,0,0,0.15);}
  .th-sortable{position:relative}
  .th-sortable .sort-ind{font-size:0.9rem;opacity:0.9;margin-left:6px}
  .edit-input{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc;background:transparent;color:inherit;margin-bottom:8px}
  .clear-btn{background-color:#e74c3c !important;color:white !important;border:none !important;border-radius:6px !important;padding:6px 12px !important;cursor:pointer !important;font-size:14px !important;font-weight:bold !important;transition:background-color 0.2s ease,transform 0.1s ease !important;}
  .clear-btn:hover{background-color:#c0392b;transform:scale(1.1);}
  .clear-btn:active{transform:scale(0.95);}
  .delete-btn{background-color:#e74c3c;color:white;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-weight:bold;transition:background-color 0.2s ease,transform 0.1s ease;}
  .delete-btn:hover{background-color:#c0392b;transform:scale(1.05);}
  .delete-btn:active{transform:scale(0.95);}
 .notas-card {
  background: #fff8e1; /* fondo cálido */
  border-left: 5px solid var(--accent);
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 12px; /* espacio sobre notas */
  margin-bottom: 12px; /* espacio debajo de notas */
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  font-size: 0.95rem;
  line-height: 1.5;
  white-space: pre-wrap; /* respeta saltos de línea */
  transition: background 0.25s, color 0.25s;
}
.notas-card h3 {
  margin-top: 0;
  margin-bottom: 8px;
  font-size: 1.1rem;
  color: var(--primary); /* modo claro */
}
.notas-card ul {
  padding-left: 20px;
  margin: 0;
}
.notas-card li {
  margin-bottom: 6px;
}
body.dark .notas-card {
  background: #2a2a2a;
  color: #f0f4f8;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}
body.dark .notas-card h3 {
  color: #ffca28; /* título visible en modo oscuro */
}

.fade-apple{
  animation: fadeApple 0.42s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes fadeApple{
  from{
    opacity:0;
    transform:translateY(10px) scale(0.98);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

details > summary {
  cursor: pointer;
  list-style: none;
  font-weight: 600;
}

details > summary::-webkit-details-marker {
  display: none;
}

details[open] > *:not(summary){
  animation: expandApple 0.26s cubic-bezier(.16,1,.3,1);
}

@keyframes expandApple{
  from{
    opacity:0;
    transform:translateY(-4px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   Details Apple – animación más lenta
   (Resumen mensual / Observaciones)
========================= */

.details-slow[open] > *:not(summary){
  animation: expandAppleSlow 0.42s cubic-bezier(.2,.8,.2,1);
}


/* =========================
   Ver notas – animación lenta estilo Apple Notes
========================= */

.notas-toggle.show{
  animation: notasFadeIn 0.55s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes notasFadeIn{
  from{
    opacity: 0;
    transform: translateY(12px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes expandAppleSlow{
  from{
    opacity:0;
    transform:translateY(-6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media (prefers-reduced-motion: reduce){
  *{
    animation: none !important;
    transition: none !important;
  }
}

.card,
.fade-apple,
details > *{
  will-change: transform, opacity;
}

  display: flex;
  flex-direction: column;

  margin-top: 10px;
}

.bpm-display{
  font-size: 1.4rem;

  text-align: center;

#bpmSlider{

.metro-buttons{

.modal{

.modal-content{

.metro-controls{

#tapTempo{

/* ================================
   DOMINGO RESALTADO (BASE)
================================ */
.domingo-proximo {
  border-radius: 12px;
  transform: scale(1.02);
  transition: all 0.3s ease;
}
    /* =================================
   ✨ GLOW PULSANTE PARA DOMINGO RESALTADO
================================= */
@keyframes domingoGlow {
  0% {
    box-shadow: 0 0 10px rgba(255, 140, 0, 0.35),
                0 0 20px rgba(255, 140, 0, 0.2);
  }
  50% {
    box-shadow: 0 0 22px rgba(255, 140, 0, 0.55),
                0 0 32px rgba(255, 140, 0, 0.35);
  }
  100% {
    box-shadow: 0 0 10px rgba(255, 140, 0, 0.35),
                0 0 20px rgba(255, 140, 0, 0.2);
  }
}

.domingo-proximo {
  animation: domingoGlow 2.5s ease-in-out infinite;
}

/* ================================
   ☀ MODO CLARO
================================ */
body:not(.dark) .domingo-proximo {
  background: linear-gradient(135deg, #ffb347, #ff8c00);
  border: 2px solid #ff8c00;
  box-shadow: 0 6px 18px rgba(255, 140, 0, 0.35);
  color: #ffffff;
}

body:not(.dark) .domingo-proximo h4,
body:not(.dark) .domingo-proximo li {
  color: #ffffff;
}

/* ================================
   🌙 MODO OSCURO (Elegante)
================================ */
body.dark .domingo-proximo {
  background: linear-gradient(135deg, #2a1a00, #3a2400);
  border: 1px solid rgba(255, 140, 0, 0.4);
  box-shadow: 0 0 22px rgba(255, 140, 0, 0.25);
  color: #ffffff;
}

body.dark .domingo-proximo h4,
body.dark .domingo-proximo li {
  color: #ffffff;
}

/* =================================
   🏷 ETIQUETA PRÓXIMO SERVICIO CON GLOW PREMIUM
================================= */
.proximo-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  margin-top: 4px;
  letter-spacing: 0.5px;
  opacity: 0.9;
  text-shadow: 0 0 6px rgba(255, 140, 0, 0.6),
               0 0 12px rgba(255, 140, 0, 0.4),
               0 0 18px rgba(255, 140, 0, 0.3);
  animation: glowPulse 2.5s ease-in-out infinite;
}

/* En modo claro */
body:not(.dark) .proximo-label {
  color: #ffecb3; /* amarillo suave */
}

/* En modo oscuro */
body.dark .proximo-label {
  color: #ffd27f; /* amarillo elegante */
}

/* ✨ ANIMACIÓN GLOW PULSANTE */
@keyframes glowPulse {
  0% {
    text-shadow: 0 0 6px rgba(255, 140, 0, 0.6),
                 0 0 12px rgba(255, 140, 0, 0.4),
                 0 0 18px rgba(255, 140, 0, 0.3);
  }
  50% {
    text-shadow: 0 0 12px rgba(255, 140, 0, 0.9),
                 0 0 20px rgba(255, 140, 0, 0.6),
                 0 0 28px rgba(255, 140, 0, 0.4);
  }
  100% {
    text-shadow: 0 0 6px rgba(255, 140, 0, 0.6),
                 0 0 12px rgba(255, 140, 0, 0.4),
                 0 0 18px rgba(255, 140, 0, 0.3);
  }
}

/* =========================
   MODAL LISTADO MENSUAL
========================= */
.modal-listado {
  background: #fff8dc; /* amarillo claro tipo secciones */
  color: black;
  opacity: 0;
  transform: translate(-50%, -48%) scale(0.96);
  transition: 
    opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
    background 0.3s ease;
}

/* Visible */
.modal-listado.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

body.dark .modal-listado {
  background: rgba(20, 20, 20, 0.85);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
}

/* Títulos en modo oscuro */
body.dark .modal-listado h2,
body.dark .modal-listado h3,
body.dark .modal-listado h4 {
  color: #ffffff;
}

/* Texto de listas */
body.dark .modal-listado li {
  color: #ffffff;
}

/* Botón cerrar */
body.dark .modal-listado .close-btn {
  color: #ffffff;
}
    
  /* Base modal */
.modal-listado {
  opacity: 0;
  transform: translate(-50%, -48%) scale(0.96);
  transition: 
    opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1),

}

/* Visible */
.modal-listado.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

================================= */

/* En modo claro */

  color: #5a5a5a; /* gris suave */
}

/* En modo oscuro */
body.dark .proximo-label {
  color: #bbbbbb; /* gris claro elegante */
}
  </style>

/* Utilidades */
function normalizar(t){ return (t||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }
function resaltar(t,q){ if(!q) return t; try{ const r=new RegExp(`(${q})`,"gi"); return t.replace(r,"<mark>$1</mark>"); }catch(e){return t;} }
function pad(n){ return String(n).padStart(2,'0'); }
function isoToday(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function isoToDisplay(iso){ if(!iso) return '—'; if(/^\d{4}-\d{2}-\d{2}$/.test(iso)){ const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; } const dt=new Date(iso); if(isNaN(dt.getTime())) return iso; return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()}`; }


function ajustarAServicio(fechaISO) {
  if (!fechaISO) return fechaISO;

  const d = new Date(fechaISO);
  if (isNaN(d)) return fechaISO;

  // Si es sábado (6), mover a domingo
  if (d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }

  return d.toISOString().slice(0, 10);
}

async function obtenerCantantePorFecha(fechaISO){
  try {
    const fechaServicio = ajustarAServicio(fechaISO); // 👈 clave
    const mes = fechaServicio.slice(0,7); // YYYY-MM

    const analisisSnap = await getDoc(doc(db,"analisis_mensual",mes));

    if (analisisSnap.exists()) {
      const data = analisisSnap.data();
      if (data.cantantes && data.cantantes[fechaServicio]) {
        return data.cantantes[fechaServicio];
      }
    }

    // fallback: cantante de la semana
    const semanaSnap = await getDoc(doc(db,"secciones","semana"));
    if (semanaSnap.exists()) {
      return semanaSnap.data().cantante || "—";
    }

    return "—";
  } catch (e) {
    console.error("Error obteniendo cantante:", e);
    return "—";
  }
}

/* =========================
   Fechas – análisis mensual
========================= */
function obtenerDomingosDelMes(mes) {
  const [y, m] = mes.split("-").map(Number);
  const fechas = [];

  let d = new Date(y, m - 1, 1);

  // Ir al primer domingo del mes
  const diaSemana = d.getDay();
  if (diaSemana !== 0) {
    d.setDate(d.getDate() + (7 - diaSemana));
  }

  while (d.getMonth() === m - 1) {

    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");

    fechas.push(`${year}-${month}-${day}`);

    d.setDate(d.getDate() + 7);
  }

  return fechas;
}

function construirCard(d){
  const div = document.createElement("div");
  div.className = "card fade-apple";

  const q = document.getElementById("search").value || "";
  const tituloHtml = modoEdicion 
    ? `<input type="text" class="edit-titulo edit-input" value="${(d.titulo||'').replace(/"/g,'&quot;')}" />`
    : `<h2>${resaltar(d.titulo||'', q)}</h2>`;

  // meta-line (vecestocada / última) justo debajo del título
  const metaHtml = `
    <div class="meta-line">
      <span class="plays" id="plays-${d.id}">🎵 Veces tocada: —</span>
      <span class="last" id="last-${d.id}">| Última vez: —</span>
      ${modoEdicion ? `<button class="tocada-btn" id="tocadaBtn-${d.id}">Tocada +1</button>` : ''}
    </div>
  `;

  // acordes
  const acordesHtml = modoEdicion 
    ? `<textarea class="edit-acordes edit-input">${(d.acordes||'')}</textarea>`
    : `<p>${(d.acordes||'')}</p>`;

  // imágenes: en edición mostramos textarea para URLs + preview div; fuera de edición mostramos imgs
  const imagenesHtml = modoEdicion
    ? `<textarea class="edit-imagenes edit-input" data-id="${d.id}">${(d.imagenes||[]).join("\n")}</textarea><div id="preview-${d.id}">${(d.imagenes||[]).map(u=>`<img class="preview-img" src="${u}" />`).join("")}</div>`
    : `<div>${(d.imagenes||[]).map(u=>`<img src="${u}" style="width:100%;margin-top:8px;border-radius:8px;">`).join("")}</div>`;

  // audio / youtube fields
  const audioHtml = modoEdicion ? `<input type="text" class="edit-audio edit-input" value="${(d.audio||'').replace(/"/g,'&quot;')}" placeholder="Link de audio">` : (d.audio ? `<a class="link-btn" href="${d.audio}" target="_blank">🎧 Escuchar</a>` : "");
  const youtubeHtml = modoEdicion ? `<input type="text" class="edit-youtube edit-input" value="${(d.youtube||'').replace(/"/g,'&quot;')}" placeholder="Link de YouTube">` : (d.youtube ? `<a class="link-btn" href="${d.youtube}" target="_blank">📺 YouTube</a>` : "");

  // edit buttons
const editButtons = modoEdicion 
  ? `<div style="margin-top:10px">
       <button onclick="guardarEdicion('${d.id}', this)">💾 Guardar</button> 
       <button class="delete-btn" onclick="borrarCancion('${d.id}')">🗑️ Borrar</button>
     </div>` 
  : "";

  div.innerHTML = tituloHtml + metaHtml + acordesHtml + `<div style="margin-top:8px">${imagenesHtml}</div>` + `<div style="margin-top:8px">${audioHtml} ${youtubeHtml}</div>` + editButtons;

  // actualizar data de registro en la tarjeta
  actualizarRegistroCard(d.id);

  // si estamos en modo edición, enlazamos listeners para preview e "Tocada +1"
  if(modoEdicion){
    // pequeña espera para que el DOM del card se inserte antes de seleccionar elementos
    setTimeout(()=>{
      const tocBtn = document.getElementById(`tocadaBtn-${d.id}`);
      if(tocBtn) tocBtn.addEventListener('click', ()=> marcarTocada(d.id));

      // listener de preview en textarea
      const area = div.querySelector(".edit-imagenes");
      const preview = document.getElementById(`preview-${d.id}`);
      if(area && preview){
        area.addEventListener('input', ()=> {
          const urls = area.value.split("\n").map(s=>s.trim()).filter(Boolean);
          preview.innerHTML = urls.map(u=>`<img class="preview-img" src="${u}" />`).join("");
        });
      }
    },0);
  }

  return div;
}

/* Actualiza la línea de registro dentro de la tarjeta */
async function actualizarRegistroCard(id){
  try{
    const ref = doc(db,"registro",id);
    const snap = await getDoc(ref);
    const playsEl = document.getElementById(`plays-${id}`);
    const lastEl = document.getElementById(`last-${id}`);
    if(!playsEl || !lastEl) return;
    if(!snap.exists()){
      playsEl.innerHTML = `🎵 <strong>Veces tocada:</strong> 0`;
      lastEl.innerHTML = `| <strong>Última vez:</strong> —`;
      return;
    }
    const data = snap.data();
    const veces = Number(data.veces||0);
    const fechas = Array.isArray(data.fechas) ? data.fechas : [];
    const ultima = fechas.length ? fechas[fechas.length-1] : null;
    playsEl.innerHTML = `🎵 <strong>Veces tocada:</strong> ${veces}`;
    lastEl.innerHTML = `| <strong>Última vez:</strong> ${ultima ? isoToDisplay(ultima) : '—'}`;
  } catch(e){ console.error("Error actualizarRegistroCard:", e); }
}

/* Marcar tocada +1 */
async function marcarTocada(id){
  try{
    const ref = doc(db,"registro",id);
    const snap = await getDoc(ref);
    const data = snap.exists()?snap.data():{veces:0,fechas:[]};
    const nuevas = Array.isArray(data.fechas)?[...data.fechas]:[];
    nuevas.push(isoToday());
    await setDoc(ref, {veces: nuevas.length, fechas: nuevas});
    actualizarRegistroCard(id);
    if(document.getElementById("registro-canciones").style.display==="block") cargarRegistro();
  } catch(e){ console.error("Error marcarTocada:", e); alert("Error marcando tocada (mira consola)."); }

// Función para renderizar notas en lista con emojis
function renderNotas(texto){
  if(!texto) return "(No hay notas para esta sección)";

  // Agregar emojis según palabras clave
  texto = texto.replace(/importante/gi, "⚠️ importante")
               .replace(/ensayar/gi, "🎵 ensayar")
               .replace(/recordar/gi, "🔔 recordar")
               .replace(/audio/gi, "🎧 audio");

  // Separar en líneas y convertir en <ul>
  const lineas = texto.split("\n").filter(l => l.trim());
  return `<ul>${lineas.map(l => `<li>${l}</li>`).join("")}</ul>`;
}

    }

async function agregarFechaManual(id){
  const fecha = prompt("Introduce la fecha (YYYY-MM-DD):");
  if(!fecha) return;
  const ref = doc(db,"registro",id);
  const snap = await getDoc(ref);
  const data = snap.exists()?snap.data():{veces:0,fechas:[]};
  const nuevas = Array.isArray(data.fechas) ? [...data.fechas, fecha] : [fecha];
  await setDoc(ref, { veces: nuevas.length, fechas: nuevas });
  cargarRegistro();
}
async function borrarFecha(id, idx){
  if(!confirm("Borrar esta fecha?")) return;
  const ref = doc(db,"registro",id);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  const data = snap.data();
  const nuevas = Array.isArray(data.fechas) ? data.fechas.filter((_,i)=>i!==idx) : [];
  await setDoc(ref, { veces: nuevas.length, fechas: nuevas });
  cargarRegistro();
}
async function modificarFecha(id, idx, val){
  const ref = doc(db,"registro",id);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  const data = snap.data();
  const nuevas = Array.isArray(data.fechas) ? [...data.fechas] : [];
  nuevas[idx] = val;
  await setDoc(ref, { veces: nuevas.length, fechas: nuevas });
  cargarRegistro();
}

let beatCount = 0; // para acento en el 1 (4/4)
let audioCtx;
let metronomeInterval = null;
let isRunning = false;
let currentBpm = Number(localStorage.getItem("metroBpm")) || 80;
// TAP TEMPO
let tapTimes = [];
let lastTap = 0;
const MAX_TAPS = 6;

const bpmSlider = () => document.getElementById("bpmSlider");
const bpmValue  = () => document.getElementById("bpmValue");
const metroBtn  = () => document.getElementById("metroToggle");

function initMetronome(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

function playClick(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  const isAccent = beatCount === 0;

  // 🌲 Wood click
  osc.type = "triangle";
  osc.frequency.value = isAccent ? 1200 : 800;

  // Envolvente corta tipo madera
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(
    //volumen del click del metronomo 
    isAccent ? 0.6 : 0.38,
    now + 0.005
  );
  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    now + 0.04
  );

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + 0.05);

  beatCount = (beatCount + 1) % 4; // 4/4
}

function startMetronome(){
  initMetronome();
  const interval = 60000 / currentBpm;
  
  beatCount = 0;
  playClick();
  metronomeInterval = setInterval(playClick, interval);
  isRunning = true;
  metroBtn().textContent = "⏸ Stop";
}

function stopMetronome(){
  clearInterval(metronomeInterval);
  metronomeInterval = null;
  isRunning = false;
  metroBtn().textContent = "▶️ Start";
}
function tapTempo(){
  initMetronome();

  const now = performance.now();

  if(now - lastTap > 2000){
    tapTimes = [];
  }

  lastTap = now;
  tapTimes.push(now);

  if(tapTimes.length > MAX_TAPS){
    tapTimes.shift();
  }

  if(tapTimes.length >= 2){
    let intervals = [];
    for(let i = 1; i < tapTimes.length; i++){
      intervals.push(tapTimes[i] - tapTimes[i-1]);
    }

    const avg = intervals.reduce((a,b)=>a+b) / intervals.length;
    const bpm = Math.round(60000 / avg);

    if(bpm >= 50 && bpm <= 280){
      currentBpm = bpm;
      bpmSlider().value = bpm;
      bpmDisplay().textContent = bpm;

      if(isRunning){
        stopMetronome();
        startMetronome();
      }
    }
  }
}

function toggleMetronome(){
  isRunning ? stopMetronome() : startMetronome();
}

function abrirMetronomo(){
  document.getElementById("modal-metronomo").style.display = "flex";

  bpmSlider().value = currentBpm;
  bpmValue().textContent = currentBpm;
}

function cerrarMetronomo(){
  stopMetronome();
  document.getElementById("modal-metronomo").style.display = "none";
}

window.analizarPeriodo = async function(mesesAtras){

  const cont = document.getElementById("resultado-periodo");
  cont.innerHTML = "Analizando...";

  const snap = await getDocs(collection(db,"analisis_mensual"));

  let meses = snap.docs.map(d => d.id).sort().reverse();

  if(mesesAtras > 0){
    meses = meses.slice(0, mesesAtras);
  }

  const acumulado = {
    Excelente: {},
    Bien: {},
    "A mejorar": {}
  };

  for(const mes of meses){
    const data = snap.docs.find(d => d.id === mes)?.data();
    if(!data?.evaluaciones) continue;

    for(const [id, valor] of Object.entries(data.evaluaciones)){
      if(!valor) continue;

      const cancion = cancionesCache.find(c=>c.id===id);
      if(!cancion) continue;

      if(!acumulado[valor][id]){
        acumulado[valor][id] = {
          titulo: cancion.titulo,
          veces: 0,
          cantantes: new Set()
        };
      }

      acumulado[valor][id].veces++;

      if(data.cantantes){
        Object.values(data.cantantes).forEach(c=>{
          if(c) acumulado[valor][id].cantantes.add(c);
        });
      }
    }
  }

  const total =
    Object.keys(acumulado["Excelente"]).length +
    Object.keys(acumulado["Bien"]).length +
    Object.keys(acumulado["A mejorar"]).length;

  window.cacheResultados = acumulado;

  cont.innerHTML = `
    <p>Total evaluadas: <strong>${total}</strong></p>

    <p onclick="mostrarDetallePeriodo('Excelente')" style="cursor:pointer">
      🚀 ${Object.keys(acumulado["Excelente"]).length} fueron excelentes
    </p>

    <p onclick="mostrarDetallePeriodo('Bien')" style="cursor:pointer">
      👍 ${Object.keys(acumulado["Bien"]).length} fueron buenas
    </p>

    <p onclick="mostrarDetallePeriodo('A mejorar')" style="cursor:pointer">
      ‼️ ${Object.keys(acumulado["A mejorar"]).length} necesitan mejorar
    </p>

    <div id="detalle-periodo"></div>
  `;
};

window.mostrarDetallePeriodo = function(tipo){

  if(!datos || !Object.keys(datos).length){

      if(fechaObj.getDay() !== 0) return; // solo domingos

      const mesKey = f.substring(0,7); // YYYY-MM

      if(!mapaMeses[mesKey]) mapaMeses[mesKey] = {};
      if(!mapaMeses[mesKey][f]) mapaMeses[mesKey][f] = [];

      mapaMeses[mesKey][f].push(docu.id);
    });
  });

  const mesesOrdenados = Object.keys(mapaMeses).sort().reverse();

  if(!mesesOrdenados.length){
    cont.innerHTML = "<p>No hay datos registrados.</p>";
    return;
  }

  // ===== FUNCIÓN PARA CREAR CARD DE MES =====
  function crearCardMes(mesKey){

    const fechasOrdenadas = Object.keys(mapaMeses[mesKey]).sort();
    const fechaBase = new Date(mesKey + "-01");
    const nombreMes = fechaBase.toLocaleString("es-ES",{month:"long",year:"numeric"});

    const cardMes = document.createElement("div");
    cardMes.className = "card";
    cardMes.style.marginBottom = "20px";

    cardMes.innerHTML = `
      <h3 class="titulo-mes" style="cursor:pointer; font-size:18px; font-weight:600; margin-bottom:10px;">
        📅 ${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)} ▸
      </h3>
      <div class="contenido-mes" style="display:none;"></div>
    `;

    const titulo = cardMes.querySelector(".titulo-mes");
    const contenidoMes = cardMes.querySelector(".contenido-mes");

    titulo.addEventListener("click",()=>{
      const abierto = contenidoMes.style.display === "block";
      contenidoMes.style.display = abierto ? "none" : "block";
      titulo.innerHTML = `📅 ${nombreMes.charAt(0).toUpperCase() + nombreMes.slice(1)} ${abierto ? "▸" : "▾"}`;
    });

    fechasOrdenadas.forEach(fecha=>{

      const datosGuardados = analisisGuardado[fecha] || { cantante:"", evaluaciones:{} };

      const domingoDiv = document.createElement("div");
      domingoDiv.style.marginBottom = "20px";

      const cancionesHtml = mapaMeses[mesKey][fecha].map(id=>{
        const cancion = cancionesCache.find(c=>c.id===id);
        const titulo = cancion?.titulo || "—";
        const val = datosGuardados.evaluaciones?.[id] || "";

        if(modoEdicion){
          return `
            <li>
              ${titulo}
              <select class="eval-real" data-id="${id}" data-fecha="${fecha}">
                <option value=""></option>
                <option value="Excelente" ${val==="Excelente"?"selected":""}>🚀</option>
                <option value="Bien" ${val==="Bien"?"selected":""}>👍</option>
                <option value="A mejorar" ${val==="A mejorar"?"selected":""}>‼️</option>
              </select>
            </li>
          `;
        } else {
          const emoji =
            val==="Excelente"?"🚀":
            val==="Bien"?"👍":
            val==="A mejorar"?"‼️":"";
          return `<li>${titulo} ${emoji}</li>`;
        }

      }).join("");

      const cantanteHtml = modoEdicion
        ? `<select class="cantante-real" data-fecha="${fecha}">
            <option value=""></option>
            <option value="Milly" ${datosGuardados.cantante==="Milly"?"selected":""}>Milly</option>
            <option value="Carolina" ${datosGuardados.cantante==="Carolina"?"selected":""}>Carolina</option>
            <option value="Jason" ${datosGuardados.cantante==="Jason"?"selected":""}>Jason</option>
          </select>`
        : `<strong>${datosGuardados.cantante || "-"}</strong>`;

      domingoDiv.innerHTML = `
        <h4 style="margin-bottom:5px;">▸ ${isoToDisplay(fecha)}</h4>
        <p>🎤 Cantante: ${cantanteHtml}</p>
        <ul>${cancionesHtml}</ul>
        ${modoEdicion ? `<button class="guardar-real" data-fecha="${fecha}">💾 Guardar</button>` : ""}
      `;

      contenidoMes.appendChild(domingoDiv);
    });

    return cardMes;
  }

  // ===== MOSTRAR MES ACTUAL =====
  if(mapaMeses[mesActualKey]){
    cont.appendChild(crearCardMes(mesActualKey));
  }

  // ===== MESES ANTERIORES =====
  const mesesAnteriores = mesesOrdenados.filter(m=>m !== mesActualKey);

  if(mesesAnteriores.length){

    const btn = document.createElement("button");
    btn.textContent = "📂 Ver meses anteriores";
    btn.style.margin = "15px 0";

    cont.appendChild(btn);

    const contenedorAntiguos = document.createElement("div");
    contenedorAntiguos.style.display = "none";

    cont.appendChild(contenedorAntiguos);

    btn.addEventListener("click",()=>{
      const visible = contenedorAntiguos.style.display === "block";
      contenedorAntiguos.style.display = visible ? "none" : "block";
      btn.textContent = visible
        ? "📂 Ver meses anteriores"
        : "📂 Ocultar meses anteriores";
    });

    mesesAnteriores.forEach(mesKey=>{
      contenedorAntiguos.appendChild(crearCardMes(mesKey));
    });
  }

  // ===== GUARDAR CAMBIOS =====
  if(modoEdicion){
    document.querySelectorAll(".guardar-real").forEach(btn=>{
      btn.addEventListener("click", async ()=>{

        const fecha = btn.dataset.fecha;
        const evaluaciones = {};

        document.querySelectorAll(`.eval-real[data-fecha="${fecha}"]`).forEach(sel=>{
          evaluaciones[sel.dataset.id] = sel.value;
        });

        const cantanteSel = document.querySelector(`.cantante-real[data-fecha="${fecha}"]`);
        const cantante = cantanteSel ? cantanteSel.value : "";

        await setDoc(doc(db,"analisis_real",fecha),{
          cantante,
          evaluaciones
        });

        alert("✅ Análisis real guardado");
      });
    });
  }
}

window.toggleAnalisisReal = toggleAnalisisReal;

/* Mostrar / ocultar Worship Pack (tarjetas de las canciones listadas en la sección) */
async function mostrarWorshipPack(tipo) {
  const cont = document.getElementById(`worshippack-${tipo}`);
  const boton = document.querySelector(
    `button[onclick="mostrarWorshipPack('${tipo}')"]`
  );
  if (!cont || !boton) return;

  // Toggle
  if (cont.style.display === "block") {
    cont.style.display = "none";
    cont.innerHTML = "";
    boton.textContent = "🎁 Worship Pack";
    return;
  }

  const snap = await getDoc(doc(db, "secciones", tipo));
  if (!snap.exists()) {
    cont.innerHTML = "<p>No hay canciones guardadas.</p>";
    cont.style.display = "block";
    boton.textContent = "🔽 Ocultar pack";
    return;
  }

  const data = snap.data();
  cont.innerHTML = "";

  // 🔑 CLAVE: recorrer en el orden escrito
  data.canciones.forEach(tituloSemana => {
    const cancion = cancionesCache.find(
      c => normalizar(c.titulo) === normalizar(tituloSemana)
    );

    if (cancion) {
      cont.appendChild(construirCard(cancion));
    }
  });

  if (!cont.innerHTML) {
    cont.innerHTML =
      "<p>⚠️ Ninguna de las canciones coincide con el repertorio.</p>";
  }

  cont.style.display = "block";
  boton.textContent = "🔽 Ocultar pack";
}

  searchInput.addEventListener("input", ()=>{ debounceBuscar(); clearBtn.style.display = searchInput.value ? "block" : "none"; });

  // bind global functions used from html

  window.abrirMetronomo = abrirMetronomo;

  inicializarCanciones();

  window.verHistorialConCantante = verHistorialConCantante;

});
